<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">Premium phone accessories showroom display</title>
  <desc id="desc">iPhone, Samsung phone, cases, earbuds, chargers, and accessories arranged on a glossy showroom surface.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f7f5"/>
      <stop offset=".45" stop-color="#d9dde1"/>
      <stop offset="1" stop-color="#111318"/>
    </linearGradient>
    <linearGradient id="phoneDark" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2a2d33"/>
      <stop offset=".58" stop-color="#090a0c"/>
      <stop offset="1" stop-color="#3a3f47"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fdfdfd"/>
      <stop offset=".36" stop-color="#b9c6d4"/>
      <stop offset="1" stop-color="#090b0f"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".45" stop-color="#bfc5cb"/>
      <stop offset="1" stop-color="#656b73"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff2c9"/>
      <stop offset=".55" stop-color="#c89d44"/>
      <stop offset="1" stop-color="#7a581e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="#000" flood-opacity=".34"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>
  <rect width="1400" height="920" rx="48" fill="url(#bg)"/>
  <circle cx="1110" cy="168" r="210" fill="#fff" opacity=".22" filter="url(#soft)"/>
  <circle cx="242" cy="220" r="150" fill="#fff" opacity=".18" filter="url(#soft)"/>
  <ellipse cx="720" cy="768" rx="500" ry="74" fill="#000" opacity=".34" filter="url(#soft)"/>
  <g filter="url(#shadow)">
    <rect x="522" y="102" width="302" height="620" rx="52" fill="url(#phoneDark)"/>
    <rect x="546" y="132" width="254" height="560" rx="34" fill="url(#screen)"/>
    <rect x="638" y="150" width="70" height="14" rx="7" fill="#0f1115"/>
    <circle cx="672" cy="422" r="92" fill="#fff" opacity=".1"/>
    <path d="M620 505c58-100 115-152 178-156v343H546c15-61 40-123 74-187Z" fill="#fff" opacity=".14"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="820" y="212" width="245" height="500" rx="42" fill="#15181d"/>
    <rect x="842" y="238" width="201" height="448" rx="28" fill="#0b0d11"/>
    <path d="M842 574c61-112 126-173 201-184v296H842Z" fill="#d8dde3" opacity=".26"/>
    <circle cx="942" cy="382" r="74" fill="#77b8ff" opacity=".22"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="294" y="234" width="220" height="470" rx="38" fill="url(#silver)"/>
    <rect x="316" y="258" width="176" height="422" rx="25" fill="#111318"/>
    <circle cx="405" cy="420" r="60" fill="#e8ecef" opacity=".16"/>
    <path d="M316 573c48-91 106-140 176-146v253H316Z" fill="#f7f7f7" opacity=".2"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="180" y="590" width="270" height="135" rx="32" fill="#f5f5f2"/>
    <rect x="216" y="616" width="76" height="84" rx="22" fill="#121418"/>
    <rect x="310" y="616" width="104" height="84" rx="24" fill="#d9dde1"/>
    <circle cx="254" cy="658" r="22" fill="#f5f5f2"/>
    <circle cx="362" cy="658" r="22" fill="#111318" opacity=".78"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="1024" y="572" width="180" height="142" rx="34" fill="#f7f7f4"/>
    <rect x="1060" y="607" width="42" height="72" rx="16" fill="url(#gold)"/>
    <rect x="1122" y="607" width="42" height="72" rx="16" fill="#17191e"/>
    <path d="M1126 592h34" stroke="#c9ced4" stroke-width="10" stroke-linecap="round"/>
  </g>
  <g filter="url(#shadow)">
