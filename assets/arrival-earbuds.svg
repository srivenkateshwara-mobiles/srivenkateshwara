    <rect x="320" y="360" width="260" height="92" rx="42" fill="#f8f8f5"/>
    <circle cx="450" cy="398" r="16" fill="#b4bbc4"/>
    <g transform="translate(282 130) rotate(-13 96 170)">
      <rect x="82" y="148" width="54" height="210" rx="27" fill="url(#bud)"/>
      <ellipse cx="104" cy="122" rx="70" ry="84" fill="url(#bud)"/>
      <ellipse cx="102" cy="122" rx="33" ry="42" fill="#15171c" opacity=".84"/>
    </g>
    <g transform="translate(470 126) rotate(13 96 170)">
      <rect x="82" y="148" width="54" height="210" rx="27" fill="url(#bud)"/>
