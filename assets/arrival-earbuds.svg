<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" role="img" aria-label="Bluetooth earbuds product display">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#f9f9f6"/><stop offset=".48" stop-color="#cfd6de"/><stop offset="1" stop-color="#0e1014"/></linearGradient>
    <linearGradient id="bud" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#fff"/><stop offset=".52" stop-color="#e3e7ec"/><stop offset="1" stop-color="#a5acb5"/></linearGradient>
    <filter id="shadow" x="-30%" y="-25%" width="160%" height="170%"><feDropShadow dx="0" dy="32" stdDeviation="28" flood-color="#000" flood-opacity=".32"/></filter>
    <filter id="blur"><feGaussianBlur stdDeviation="22"/></filter>
